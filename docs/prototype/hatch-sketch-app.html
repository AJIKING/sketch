<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Hatch — ポケットのアトリエ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Space+Grotesk:wght@400;500;600&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ============ DESIGN TOKENS ============ */
:root{
  --shell:#1c1813;
  --shell-2:#15120d;
  --surface:#221d17;
  --surface-2:#2c2620;
  --surface-3:#373027;
  --hair:rgba(243,236,221,.10);
  --hair-strong:rgba(243,236,221,.18);
  --paper:#efe7d6;
  --ink:#f3ecdd;
  --ink-dim:#b3a791;
  --ink-faint:#8a8070;

  /* limited artist palette */
  --c-vermilion:#cf4a2c;
  --c-indigo:#2c4a63;
  --c-ochre:#c69749;
  --c-sumi:#2a2620;
  --c-paper:#efe7d6;

  /* dynamic accent = current ink color (updated by JS) */
  --accent:#cf4a2c;
  --accent-soft:rgba(207,74,44,.16);

  --r-sm:10px; --r-md:16px; --r-lg:24px; --r-xl:32px;
  --shadow-soft:0 10px 30px -12px rgba(0,0,0,.6);
  --shadow-pop:0 16px 40px -10px rgba(0,0,0,.65);
  --sp:8px;
  --ease:cubic-bezier(.22,1,.36,1);
  --spring:cubic-bezier(.34,1.56,.64,1);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:"Zen Kaku Gothic New","Space Grotesk",system-ui,sans-serif;
  background:
    radial-gradient(120% 80% at 50% -10%, #2a241c 0%, var(--shell) 45%, var(--shell-2) 100%);
  color:var(--ink);
  display:grid; place-items:center;
  min-height:100dvh;
  padding:24px;
  overflow:hidden;
}
.stage-tag{
  position:fixed; left:18px; bottom:14px; z-index:50;
  font:500 11px/1 "Space Grotesk",sans-serif; letter-spacing:.14em;
  color:var(--ink-faint); text-transform:uppercase; user-select:none;
}

/* ============ DEVICE FRAME ============ */
.device{
  position:relative;
  width:min(430px,96vw);
  height:min(900px,92dvh);
  background:#0c0a07;
  border-radius:46px;
  padding:11px;
  box-shadow:
    0 50px 90px -30px rgba(0,0,0,.8),
    inset 0 0 0 2px #2a251d,
    inset 0 0 0 11px #0c0a07;
}
.screen{
  position:relative; width:100%; height:100%;
  border-radius:36px; overflow:hidden;
  background:var(--shell);
  isolation:isolate;
}
.notch{
  position:absolute; top:9px; left:50%; transform:translateX(-50%);
  width:118px; height:26px; background:#0c0a07; border-radius:0 0 16px 16px; z-index:60;
}
@media (max-width:480px){
  body{padding:0}
  .device{width:100vw;height:100dvh;border-radius:0;padding:0;box-shadow:none}
  .screen{border-radius:0}
  .notch{display:none}
}

/* shared paper grain overlay */
.grain::after{
  content:""; position:absolute; inset:0; pointer-events:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/></svg>");
  opacity:.05; mix-blend-mode:overlay;
}

/* ============ VIEWS ============ */
.view{position:absolute; inset:0; display:flex; flex-direction:column}
#galleryView{z-index:2; transition:transform .5s var(--ease), opacity .4s var(--ease)}
#canvasView{z-index:3; transform:translateY(101%); transition:transform .55s var(--ease)}
body.in-canvas #galleryView{transform:scale(.94); opacity:0; pointer-events:none}
body.in-canvas #canvasView{transform:translateY(0)}

/* ============ GALLERY ============ */
.g-head{
  padding:54px 22px 14px; display:flex; align-items:flex-end; justify-content:space-between;
}
.brand{display:flex; flex-direction:column; gap:2px}
.brand .word{
  font-family:"Fraunces",serif; font-weight:900; font-size:38px; line-height:.9;
  letter-spacing:-.02em; color:var(--ink);
  position:relative; width:fit-content;
}
.brand .word::after{
  content:""; position:absolute; left:2px; right:6px; bottom:-3px; height:5px; border-radius:4px;
  background:var(--accent);
  transform-origin:left;
  animation:stroke .9s .25s var(--ease) both;
}
@keyframes stroke{from{transform:scaleX(0)}to{transform:scaleX(1)}}
.brand .sub{font:500 12px/1 "Space Grotesk",sans-serif; letter-spacing:.32em; color:var(--ink-faint); text-transform:uppercase; padding-left:3px}
.g-head .count{font:500 12px/1.4 "Space Grotesk",sans-serif; color:var(--ink-dim); text-align:right}

.g-scroll{flex:1; overflow-y:auto; padding:6px 18px 28px; scrollbar-width:none}
.g-scroll::-webkit-scrollbar{display:none}
.g-grid{display:grid; grid-template-columns:1fr 1fr; gap:16px}
.piece{
  position:relative; aspect-ratio:3/4; border-radius:var(--r-md); overflow:hidden;
  background:var(--paper); cursor:pointer; border:1px solid var(--hair);
  box-shadow:var(--shadow-soft);
  transition:transform .35s var(--spring), box-shadow .3s var(--ease);
  animation:rise .6s var(--ease) both;
}
.piece:active{transform:scale(.97)}
.piece img,.piece canvas{width:100%; height:100%; object-fit:cover; display:block}
.piece .meta{
  position:absolute; left:0; right:0; bottom:0; padding:18px 12px 9px;
  background:linear-gradient(transparent,rgba(20,16,10,.78));
  font:500 11px/1.3 "Space Grotesk",sans-serif; color:#f3ecddcc; letter-spacing:.04em;
}
.piece.new{
  display:grid; place-items:center; background:var(--surface);
  border:1px dashed var(--hair-strong); box-shadow:none;
}
.piece.new .plus{
  width:52px; height:52px; border-radius:50%; display:grid; place-items:center;
  background:var(--accent); color:#fff; box-shadow:0 8px 22px -6px var(--accent);
  transition:transform .3s var(--spring);
}
.piece.new:active .plus{transform:rotate(90deg) scale(.94)}
.piece.new .label{position:absolute; bottom:14px; font:500 12px/1 "Zen Kaku Gothic New"; color:var(--ink-dim)}
@keyframes rise{from{opacity:0; transform:translateY(14px)}to{opacity:1; transform:none}}

/* ============ CANVAS VIEW ============ */
.topbar{
  position:absolute; top:0; left:0; right:0; z-index:20;
  padding:44px 14px 10px; display:flex; align-items:center; gap:8px;
  background:linear-gradient(rgba(20,16,10,.55),transparent);
  backdrop-filter:blur(2px);
}
.topbar .spacer{flex:1}
.iconbtn{
  width:44px; height:44px; border:none; border-radius:14px; cursor:pointer;
  background:rgba(34,29,23,.7); color:var(--ink); backdrop-filter:blur(8px);
  display:grid; place-items:center; transition:transform .18s var(--spring), background .2s, color .2s;
  border:1px solid var(--hair);
}
.iconbtn:hover{background:var(--surface-2)}
.iconbtn:active{transform:scale(.9)}
.iconbtn:disabled{opacity:.32; cursor:default}
.iconbtn svg{width:21px; height:21px; stroke:currentColor; stroke-width:1.7; fill:none; stroke-linecap:round; stroke-linejoin:round}
.iconbtn.small{width:38px;height:38px}

.canvas-wrap{
  position:absolute; inset:0; display:grid; place-items:center;
  background:
    radial-gradient(140% 120% at 50% 30%, #211c15 0%, var(--shell) 70%);
}
.paper{
  position:relative;
  width:calc(100% - 8px); height:calc(100% - 8px);
  border-radius:6px; overflow:hidden;
  background:var(--paper);
  box-shadow:0 24px 60px -20px rgba(0,0,0,.7), 0 2px 0 rgba(0,0,0,.4);
}
.paper::before{ /* vignette + tooth */
  content:""; position:absolute; inset:0; pointer-events:none; z-index:3;
  background:radial-gradient(130% 120% at 50% 40%, transparent 60%, rgba(60,40,20,.10) 100%);
  mix-blend-mode:multiply;
}
.paper.grain::after{opacity:.07; z-index:2}
#draw{position:absolute; inset:0; width:100%; height:100%; touch-action:none; z-index:1; display:block}

/* left rail: size + opacity */
.rail{
  position:absolute; left:12px; top:50%; transform:translateY(-50%); z-index:18;
  display:flex; flex-direction:column; gap:14px; align-items:center;
}
.vslider{
  position:relative; width:34px; height:150px; border-radius:18px;
  background:rgba(28,24,19,.6); backdrop-filter:blur(8px);
  border:1px solid var(--hair); cursor:pointer; touch-action:none;
  box-shadow:var(--shadow-soft);
}
.vslider .fill{
  position:absolute; left:3px; right:3px; bottom:3px; border-radius:15px;
  background:linear-gradient(var(--accent), color-mix(in srgb,var(--accent) 70%, #000));
  height:40%; transition:height .05s linear;
}
.vslider .thumb{
  position:absolute; left:50%; transform:translate(-50%,50%); bottom:40%;
  width:26px; height:26px; border-radius:50%;
  background:var(--ink); border:3px solid var(--accent);
  box-shadow:0 3px 8px rgba(0,0,0,.5); transition:bottom .05s linear;
}
.vslider .vlabel{
  position:absolute; top:-22px; left:50%; transform:translateX(-50%);
  font:500 10px/1 "Space Grotesk"; letter-spacing:.1em; color:var(--ink-dim); text-transform:uppercase; white-space:nowrap;
}
.vbubble{
  position:absolute; right:46px; padding:6px 11px; border-radius:12px;
  background:var(--ink); color:var(--shell); font:600 13px/1 "Space Grotesk";
  box-shadow:var(--shadow-pop); opacity:0; transform:translateX(8px) scale(.9);
  transition:.18s var(--spring); pointer-events:none; white-space:nowrap;
}
.vslider.active .vbubble{opacity:1; transform:none}

/* bottom dock */
.dock{
  position:absolute; left:50%; bottom:26px; transform:translateX(-50%); z-index:19;
  display:flex; align-items:center; gap:6px; padding:8px;
  background:rgba(28,24,19,.78); backdrop-filter:blur(14px);
  border:1px solid var(--hair); border-radius:26px;
  box-shadow:var(--shadow-pop);
  animation:dockIn .6s .15s var(--spring) both;
}
@keyframes dockIn{from{opacity:0; transform:translate(-50%,40px)}to{opacity:1; transform:translateX(-50%)}}
.dock .divider{width:1px; height:30px; background:var(--hair-strong); margin:0 2px}
.tool{
  width:46px; height:46px; border:none; border-radius:18px; cursor:pointer; position:relative;
  background:transparent; color:var(--ink-dim); display:grid; place-items:center;
  transition:transform .2s var(--spring), color .2s, background .2s;
}
.tool svg{width:23px; height:23px; stroke:currentColor; stroke-width:1.6; fill:none; stroke-linecap:round; stroke-linejoin:round}
.tool:active{transform:scale(.88)}
.tool[aria-pressed="true"]{
  color:var(--ink); background:var(--accent-soft);
}
.tool[aria-pressed="true"]::after{
  content:""; position:absolute; bottom:6px; left:50%; transform:translateX(-50%);
  width:5px; height:5px; border-radius:50%; background:var(--accent);
}
.colorbtn{
  width:46px; height:46px; border-radius:50%; border:3px solid var(--ink);
  cursor:pointer; box-shadow:inset 0 0 0 2px var(--shell); background:var(--accent);
  transition:transform .2s var(--spring);
}
.colorbtn:active{transform:scale(.88)}
.layerbtn .badge{
  position:absolute; top:5px; right:5px; min-width:15px; height:15px; padding:0 3px;
  border-radius:8px; background:var(--accent); color:#fff;
  font:600 9px/15px "Space Grotesk"; text-align:center;
}

/* ============ SHEETS ============ */
.scrim{position:absolute; inset:0; z-index:30; background:rgba(12,9,6,.55); opacity:0; pointer-events:none; transition:opacity .3s}
.scrim.show{opacity:1; pointer-events:auto}
.sheet{
  position:absolute; left:0; right:0; bottom:0; z-index:31;
  background:var(--surface); border-radius:var(--r-xl) var(--r-xl) 0 0;
  border-top:1px solid var(--hair);
  padding:14px 18px calc(22px + env(safe-area-inset-bottom));
  transform:translateY(105%); transition:transform .42s var(--ease);
  box-shadow:0 -20px 50px -20px rgba(0,0,0,.6);
  max-height:78%; overflow-y:auto; scrollbar-width:none;
}
.sheet::-webkit-scrollbar{display:none}
.sheet.show{transform:translateY(0)}
.sheet .handle{width:40px; height:4px; border-radius:3px; background:var(--hair-strong); margin:0 auto 16px}
.sheet h3{font:700 16px/1 "Zen Kaku Gothic New"; margin-bottom:14px; display:flex; align-items:center; gap:8px}
.sheet h3 .en{font:500 11px/1 "Space Grotesk"; letter-spacing:.18em; color:var(--ink-faint); text-transform:uppercase}

/* color sheet */
.sv{
  position:relative; width:100%; aspect-ratio:1.5/1; border-radius:var(--r-md);
  background:var(--accent); cursor:crosshair; touch-action:none; overflow:hidden; margin-bottom:14px;
  border:1px solid var(--hair);
}
.sv .gw{position:absolute; inset:0; background:linear-gradient(to right,#fff,transparent)}
.sv .gb{position:absolute; inset:0; background:linear-gradient(to top,#000,transparent)}
.sv .picker{position:absolute; width:18px; height:18px; border-radius:50%; border:2px solid #fff; box-shadow:0 0 0 1px rgba(0,0,0,.4),0 2px 5px rgba(0,0,0,.4); transform:translate(-50%,-50%); pointer-events:none}
.hue{
  position:relative; height:22px; border-radius:11px; margin-bottom:16px; cursor:pointer; touch-action:none;
  background:linear-gradient(to right,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00);
}
.hue .picker{position:absolute; top:50%; width:22px; height:22px; border-radius:50%; border:3px solid #fff; box-shadow:0 1px 5px rgba(0,0,0,.5); transform:translate(-50%,-50%); pointer-events:none}
.color-foot{display:flex; align-items:center; gap:12px; margin-bottom:16px}
.color-foot .chip{width:48px; height:48px; border-radius:14px; border:2px solid var(--hair-strong); background:var(--accent); flex:none}
.color-foot .hex{font:600 16px/1 "Space Grotesk"; letter-spacing:.06em; color:var(--ink); text-transform:uppercase}
.color-foot .hexlabel{font:500 10px/1.4 "Space Grotesk"; letter-spacing:.16em; color:var(--ink-faint); text-transform:uppercase}
.swatches{display:flex; gap:10px; flex-wrap:wrap}
.swatches .sw{width:38px; height:38px; border-radius:11px; cursor:pointer; border:2px solid var(--hair); transition:transform .2s var(--spring)}
.swatches .sw:active{transform:scale(.85)}
.sw-title{font:500 10px/1 "Space Grotesk"; letter-spacing:.18em; color:var(--ink-faint); text-transform:uppercase; margin:18px 0 10px}

/* brush sheet */
.brushlist{display:flex; flex-direction:column; gap:8px}
.brushrow{
  display:flex; align-items:center; gap:14px; padding:12px 14px; border-radius:var(--r-md);
  background:var(--surface-2); cursor:pointer; border:1px solid transparent;
  transition:border-color .2s, background .2s, transform .15s var(--spring);
}
.brushrow:active{transform:scale(.985)}
.brushrow[aria-pressed="true"]{border-color:var(--accent); background:var(--surface-3)}
.brushrow .pv{width:84px; height:30px; flex:none}
.brushrow .nm{font:700 14px/1.2 "Zen Kaku Gothic New"}
.brushrow .ds{font:400 11px/1.3 "Zen Kaku Gothic New"; color:var(--ink-dim)}
.brushrow .check{margin-left:auto; color:var(--accent); opacity:0}
.brushrow[aria-pressed="true"] .check{opacity:1}
.brushrow .check svg{width:20px;height:20px;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* layers sheet */
.layeradd{display:flex; align-items:center; gap:7px; padding:9px 14px; border-radius:12px; cursor:pointer;
  background:var(--accent); color:#fff; font:700 13px/1 "Zen Kaku Gothic New"; border:none; margin-left:auto}
.layeradd svg{width:16px;height:16px;stroke:currentColor;stroke-width:2.4;fill:none;stroke-linecap:round}
.layerlist{display:flex; flex-direction:column; gap:8px; margin-top:6px}
.layerrow{display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:var(--r-md);
  background:var(--surface-2); border:1px solid transparent; transition:border-color .2s}
.layerrow.active{border-color:var(--accent)}
.layerrow .thumb{width:46px; height:46px; border-radius:10px; background:var(--paper); flex:none; border:1px solid var(--hair); overflow:hidden}
.layerrow .thumb canvas{width:100%;height:100%;display:block}
.layerrow .info{flex:1; cursor:pointer}
.layerrow .info .ln{font:700 13px/1.3 "Zen Kaku Gothic New"}
.layerrow .info .lo{font:500 11px/1 "Space Grotesk"; color:var(--ink-dim)}
.layerrow .eye,.layerrow .del{width:34px;height:34px;border:none;background:transparent;color:var(--ink-dim);border-radius:9px;cursor:pointer;display:grid;place-items:center}
.layerrow .eye:active,.layerrow .del:active{background:var(--surface-3)}
.layerrow .eye svg,.layerrow .del svg{width:18px;height:18px;stroke:currentColor;stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round}
.layerrow.hidden .info{opacity:.4}

/* menu sheet */
.menulist{display:flex; flex-direction:column}
.menuitem{display:flex; align-items:center; gap:14px; padding:15px 6px; border:none; background:transparent;
  color:var(--ink); font:500 15px/1 "Zen Kaku Gothic New"; cursor:pointer; text-align:left; border-bottom:1px solid var(--hair)}
.menuitem:last-child{border-bottom:none}
.menuitem:active{color:var(--accent)}
.menuitem.danger{color:#e0664a}
.menuitem svg{width:20px;height:20px;stroke:currentColor;stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* toast */
.toast{
  position:absolute; left:50%; bottom:96px; transform:translate(-50%,12px); z-index:40;
  background:var(--ink); color:var(--shell); padding:10px 18px; border-radius:14px;
  font:600 13px/1 "Zen Kaku Gothic New"; box-shadow:var(--shadow-pop);
  opacity:0; pointer-events:none; transition:.3s var(--spring);
}
.toast.show{opacity:1; transform:translate(-50%,0)}

:focus-visible{outline:2px solid var(--accent); outline-offset:2px}

@media (prefers-reduced-motion:reduce){
  *{animation-duration:.001ms !important; transition-duration:.05ms !important}
}
</style>
</head>
<body>
<span class="stage-tag">Hatch · Sketch UI Prototype</span>

<div class="device">
  <div class="notch"></div>
  <div class="screen grain">

    <!-- ===================== GALLERY ===================== -->
    <section class="view" id="galleryView">
      <div class="g-head">
        <div class="brand">
          <span class="word">Hatch</span>
          <span class="sub">Pocket Atelier</span>
        </div>
        <div class="count" id="pieceCount">3点の<br>スケッチ</div>
      </div>
      <div class="g-scroll">
        <div class="g-grid" id="galleryGrid">
          <button class="piece new" id="newBtn" aria-label="新しいスケッチを始める">
            <span class="plus" aria-hidden="true">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
            </span>
            <span class="label">新規キャンバス</span>
          </button>
          <!-- sample pieces injected by JS -->
        </div>
      </div>
    </section>

    <!-- ===================== CANVAS ===================== -->
    <section class="view" id="canvasView">
      <div class="canvas-wrap">
        <div class="paper grain">
          <canvas id="draw"></canvas>
        </div>
      </div>

      <!-- top bar -->
      <div class="topbar">
        <button class="iconbtn" id="backBtn" aria-label="ギャラリーへ戻る">
          <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <span class="spacer"></span>
        <button class="iconbtn small" id="undoBtn" aria-label="取り消す" disabled>
          <svg viewBox="0 0 24 24"><path d="M9 14 4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 0 10h-1"/></svg>
        </button>
        <button class="iconbtn small" id="redoBtn" aria-label="やり直す" disabled>
          <svg viewBox="0 0 24 24"><path d="m15 14 5-5-5-5"/><path d="M20 9H9a5 5 0 0 0 0 10h1"/></svg>
        </button>
        <button class="iconbtn small" id="menuBtn" aria-label="メニュー">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="12" cy="19" r="1.4"/></svg>
        </button>
      </div>

      <!-- left rail -->
      <div class="rail">
        <div class="vslider" id="sizeSlider" role="slider" aria-label="ブラシサイズ" tabindex="0" aria-valuemin="1" aria-valuemax="80" aria-valuenow="14">
          <span class="vlabel">SIZE</span>
          <div class="fill"></div><div class="thumb"></div>
          <span class="vbubble">14</span>
        </div>
        <div class="vslider" id="opacitySlider" role="slider" aria-label="不透明度" tabindex="0" aria-valuemin="0" aria-valuemax="100" aria-valuenow="100">
          <span class="vlabel">OPAC</span>
          <div class="fill"></div><div class="thumb"></div>
          <span class="vbubble">100%</span>
        </div>
      </div>

      <!-- bottom dock -->
      <div class="dock">
        <button class="tool" id="tBrush" data-tool="brush" aria-label="ブラシ" aria-pressed="true">
          <svg viewBox="0 0 24 24"><path d="M3 21c3 0 5-2 5-5 0-1.7-1.3-3-3-3s-3 1.3-3 3c0 1.5-1 2-2 2"/><path d="M14.5 4.5 9 10l3 3 5.5-5.5a2.1 2.1 0 0 0-3-3Z"/><path d="m16 6 2 2"/></svg>
        </button>
        <button class="tool" id="tSmudge" data-tool="smudge" aria-label="スマッジ" aria-pressed="false">
          <svg viewBox="0 0 24 24"><path d="M12 3s5 5.5 5 9a5 5 0 0 1-10 0c0-1.4.8-3 1.8-4.4"/><path d="M9 17c1.5 1 4.5 1 6 0"/></svg>
        </button>
        <button class="tool" id="tErase" data-tool="erase" aria-label="消しゴム" aria-pressed="false">
          <svg viewBox="0 0 24 24"><path d="m4 16 5 5h7l5-5L13 4 4 16Z"/><path d="M9 21 6 18"/><path d="m8.5 11.5 6 6"/></svg>
        </button>
        <span class="divider"></span>
        <button class="tool layerbtn" id="layerBtn" aria-label="レイヤー">
          <svg viewBox="0 0 24 24"><path d="m12 3 9 5-9 5-9-5 9-5Z"/><path d="m3 13 9 5 9-5"/></svg>
          <span class="badge" id="layerBadge">2</span>
        </button>
        <button class="colorbtn" id="colorBtn" aria-label="カラーを選択"></button>
      </div>

      <!-- scrim + sheets -->
      <div class="scrim" id="scrim"></div>

      <!-- color sheet -->
      <div class="sheet" id="colorSheet">
        <div class="handle"></div>
        <h3>カラー <span class="en">/ Ink</span></h3>
        <div class="sv" id="sv"><div class="gw"></div><div class="gb"></div><div class="picker" id="svPicker"></div></div>
        <div class="hue" id="hue"><div class="picker" id="huePicker"></div></div>
        <div class="color-foot">
          <div class="chip" id="colorChip"></div>
          <div>
            <div class="hexlabel">HEX</div>
            <div class="hex" id="hexVal">#CF4A2C</div>
          </div>
        </div>
        <div class="sw-title">Studio Palette</div>
        <div class="swatches" id="palette"></div>
        <div class="sw-title">Recent</div>
        <div class="swatches" id="recent"></div>
      </div>

      <!-- brush sheet -->
      <div class="sheet" id="brushSheet">
        <div class="handle"></div>
        <h3>ブラシ <span class="en">/ Brush</span></h3>
        <div class="brushlist" id="brushList"></div>
      </div>

      <!-- layers sheet -->
      <div class="sheet" id="layerSheet">
        <div class="handle"></div>
        <h3>レイヤー <span class="en">/ Layers</span>
          <button class="layeradd" id="addLayer"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>追加</button>
        </h3>
        <div class="layerlist" id="layerList"></div>
      </div>

      <!-- menu sheet -->
      <div class="sheet" id="menuSheet">
        <div class="handle"></div>
        <h3>キャンバス <span class="en">/ Actions</span></h3>
        <div class="menulist">
          <button class="menuitem" id="actSave">
            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5"/><path d="M12 15V3"/></svg>
            画像として保存
          </button>
          <button class="menuitem" id="actDone">
            <svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>
            完了してギャラリーへ
          </button>
          <button class="menuitem danger" id="actClear">
            <svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>
            このレイヤーを消去
          </button>
        </div>
      </div>

      <div class="toast" id="toast"></div>
    </section>

  </div>
</div>

<script>
"use strict";
const $=(s,r=document)=>r.querySelector(s);
const $$=(s,r=document)=>[...r.querySelectorAll(s)];
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

/* ---------- color helpers ---------- */
function hsv2rgb(h,s,v){
  h/=360; const i=Math.floor(h*6), f=h*6-i, p=v*(1-s), q=v*(1-f*s), t=v*(1-(1-f)*s);
  let r,g,b; switch(i%6){case 0:r=v;g=t;b=p;break;case 1:r=q;g=v;b=p;break;case 2:r=p;g=v;b=t;break;
    case 3:r=p;g=q;b=v;break;case 4:r=t;g=p;b=v;break;default:r=v;g=p;b=q;}
  return [Math.round(r*255),Math.round(g*255),Math.round(b*255)];
}
function rgb2hsv(r,g,b){
  r/=255;g/=255;b/=255; const mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn;
  let h=0; if(d){ if(mx===r)h=((g-b)/d)%6; else if(mx===g)h=(b-r)/d+2; else h=(r-g)/d+4; h*=60; if(h<0)h+=360;}
  return [h, mx?d/mx:0, mx];
}
const hex=(r,g,b)=>'#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('').toUpperCase();
function hex2rgb(h){h=h.replace('#','');return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}

/* ---------- global state ---------- */
const State={
  tool:'brush', brush:'ink', size:14, opacity:1,
  hsv:[14,.78,.81],         // current color in HSV
  recent:[],
};
function curRGB(){return hsv2rgb(...State.hsv);}
function curHEX(){return hex(...curRGB());}
function setAccent(){
  const [r,g,b]=curRGB(); const h=hex(r,g,b);
  document.documentElement.style.setProperty('--accent',h);
  document.documentElement.style.setProperty('--accent-soft',`rgba(${r},${g},${b},.16)`);
  $('#colorBtn').style.background=h;
}

/* ---------- canvas + layers ---------- */
const dcanvas=$('#draw'), dctx=dcanvas.getContext('2d');
let W=0,H=0,DPR=1, layers=[], activeLayer=0, sized=false;
const PAPER='#efe7d6';

function setupCanvas(){
  if(sized) return;
  const rect=dcanvas.getBoundingClientRect();
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=Math.round(rect.width*DPR); H=Math.round(rect.height*DPR);
  dcanvas.width=W; dcanvas.height=H;
  layers=[ makeLayer('レイヤー 1'), makeLayer('レイヤー 2') ];
  activeLayer=1; // top layer active
  composite(); sized=true;
}
function makeLayer(name){
  const c=document.createElement('canvas'); c.width=W; c.height=H;
  return {name, canvas:c, ctx:c.getContext('2d'), visible:true, opacity:1};
}
function composite(){
  dctx.clearRect(0,0,W,H);
  dctx.fillStyle=PAPER; dctx.fillRect(0,0,W,H);
  for(const L of layers){ if(!L.visible) continue; dctx.globalAlpha=L.opacity; dctx.drawImage(L.canvas,0,0);}
  dctx.globalAlpha=1;
}

/* ---------- brush presets ---------- */
const BRUSHES={
  ink   :{name:'インク',  desc:'なめらかで均一。速度で太さが変化',     flow:1,   soft:0, scatter:0, spacing:.25},
  pencil:{name:'ペンシル',desc:'ざらりとした鉛筆。重ねるほど濃く',     flow:.5,  soft:0, scatter:.9, spacing:.5},
  marker:{name:'マーカー',desc:'平らで半透明。重なりが色を作る',       flow:.55, soft:.1,scatter:0, spacing:.2},
  air   :{name:'エアブラシ',desc:'やわらかく霧状に積もる',             flow:.18, soft:1, scatter:.2, spacing:.18},
};

/* ---------- drawing engine ---------- */
let drawing=false, last=null, lastT=0, smudgeColor=null;
function pos(e){const r=dcanvas.getBoundingClientRect();return {x:(e.clientX-r.left)*DPR, y:(e.clientY-r.top)*DPR};}

function strokeStart(e){
  if(layers.length===0) return;
  const L=layers[activeLayer]; if(!L.visible) { toast('非表示のレイヤーには描けません'); return; }
  drawing=true; last=pos(e); lastT=performance.now();
  pushUndo();
  if(State.tool==='smudge'){ smudgeColor=sample(L.ctx,last); }
  stamp(L.ctx,last,last,0);
  composite();
}
function strokeMove(e){
  if(!drawing) return;
  const L=layers[activeLayer]; const p=pos(e); const t=performance.now();
  const dt=Math.max(t-lastT,1); const dist=Math.hypot(p.x-last.x,p.y-last.y); const speed=dist/dt;
  stamp(L.ctx,last,p,speed);
  last=p; lastT=t; composite();
}
function strokeEnd(){ if(!drawing)return; drawing=false; smudgeColor=null; refreshLayerThumbs(); }

function sample(ctx,p){
  try{const d=ctx.getImageData(clamp(p.x|0,0,W-1),clamp(p.y|0,0,H-1),1,1).data;
    return d[3]>10?`rgba(${d[0]},${d[1]},${d[2]},`:`rgba(207,74,44,`;}catch(e){return 'rgba(207,74,44,';}
}

function stamp(ctx,a,b,speed){
  const base=State.size*DPR;
  // velocity-based width for ink
  let w=base;
  if(State.brush==='ink'){ w=base*clamp(1.15-speed*0.9,0.4,1); }
  ctx.save();
  if(State.tool==='erase'){
    ctx.globalCompositeOperation='destination-out';
    ctx.globalAlpha=State.opacity;
    line(ctx,a,b,base,'#000',true);
    ctx.restore(); return;
  }
  if(State.tool==='smudge'){
    ctx.globalCompositeOperation='source-over';
    const dist=Math.hypot(b.x-a.x,b.y-a.y), step=Math.max(base*.25,2), n=Math.max(1,Math.floor(dist/step));
    for(let i=0;i<=n;i++){ const x=a.x+(b.x-a.x)*i/n, y=a.y+(b.y-a.y)*i/n;
      ctx.globalAlpha=.14*State.opacity; ctx.fillStyle=(smudgeColor||'rgba(120,100,80,')+'1)';
      soft(ctx,x,y,base*.6,true);
    }
    ctx.restore(); return;
  }
  // draw tool with brush preset
  const B=BRUSHES[State.brush]; const col=curHEX();
  ctx.globalCompositeOperation='source-over';
  ctx.globalAlpha=B.flow*State.opacity;
  if(State.brush==='ink'||State.brush==='marker'){
    line(ctx,a,b,w,col,B.soft>0?false:true, State.brush==='marker');
  }else{
    // stamped brushes (pencil grain / airbrush)
    const dist=Math.hypot(b.x-a.x,b.y-a.y), step=Math.max(base*B.spacing,1), n=Math.max(1,Math.floor(dist/step));
    for(let i=0;i<=n;i++){
      const x=a.x+(b.x-a.x)*i/n + (Math.random()-.5)*base*B.scatter;
      const y=a.y+(b.y-a.y)*i/n + (Math.random()-.5)*base*B.scatter;
      ctx.fillStyle=col;
      ctx.globalAlpha=B.flow*State.opacity;
      if(B.soft>0) soft(ctx,x,y,base,false,col);
      else { ctx.globalAlpha=B.flow*State.opacity*(.5+Math.random()*.5); dot(ctx,x,y,base*(.25+Math.random()*.2)); }
    }
  }
  ctx.restore();
}
function line(ctx,a,b,w,col,round,flat){
  ctx.strokeStyle=col; ctx.lineWidth=w; ctx.lineCap=round?'round':'butt'; ctx.lineJoin='round';
  ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
  if(round){ctx.beginPath(); ctx.arc(b.x,b.y,w/2,0,7); ctx.fillStyle=col; ctx.fill();}
}
function dot(ctx,x,y,r){ctx.beginPath();ctx.arc(x,y,Math.max(r,.6),0,7);ctx.fill();}
function soft(ctx,x,y,r,isSmudge,col){
  const g=ctx.createRadialGradient(x,y,0,x,y,r);
  const base=isSmudge?(smudgeColor||'rgba(120,100,80,'):null;
  if(isSmudge){ g.addColorStop(0,base+(ctx.globalAlpha)+')'); g.addColorStop(1,base+'0)'); ctx.globalAlpha=1; }
  else { const [rr,gg,bb]=hex2rgb(col); g.addColorStop(0,`rgba(${rr},${gg},${bb},${ctx.globalAlpha})`); g.addColorStop(1,`rgba(${rr},${gg},${bb},0)`); ctx.globalAlpha=1;}
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill();
}

/* pointer wiring */
dcanvas.addEventListener('pointerdown',e=>{dcanvas.setPointerCapture(e.pointerId);strokeStart(e);});
dcanvas.addEventListener('pointermove',strokeMove);
dcanvas.addEventListener('pointerup',strokeEnd);
dcanvas.addEventListener('pointercancel',strokeEnd);
dcanvas.addEventListener('pointerleave',strokeEnd);

/* ---------- undo / redo (active layer snapshots) ---------- */
let undoStack=[], redoStack=[];
function pushUndo(){
  try{ undoStack.push({i:activeLayer, data:layers[activeLayer].ctx.getImageData(0,0,W,H)});
    if(undoStack.length>16) undoStack.shift(); redoStack=[]; updHist(); }catch(e){}
}
function applyHist(from,to){
  const s=from.pop(); if(!s)return;
  const L=layers[s.i]; if(!L)return;
  to.push({i:s.i, data:L.ctx.getImageData(0,0,W,H)});
  L.ctx.putImageData(s.data,0,0); composite(); refreshLayerThumbs(); updHist();
}
$('#undoBtn').onclick=()=>applyHist(undoStack,redoStack);
$('#redoBtn').onclick=()=>applyHist(redoStack,undoStack);
function updHist(){ $('#undoBtn').disabled=!undoStack.length; $('#redoBtn').disabled=!redoStack.length; }

/* ---------- vertical sliders ---------- */
function bindVSlider(el,min,max,init,fmt,onChange){
  const fill=$('.fill',el), thumb=$('.thumb',el), bubble=$('.vbubble',el);
  let val=init;
  function render(){
    const pct=(val-min)/(max-min);
    fill.style.height=(pct*100)+'%'; thumb.style.bottom=(pct*100)+'%';
    bubble.style.bottom='calc('+(pct*100)+'% - 12px)'; bubble.textContent=fmt(val);
    el.setAttribute('aria-valuenow',Math.round(val));
  }
  function fromEvent(e){
    const r=el.getBoundingClientRect();
    const pct=clamp(1-(e.clientY-r.top)/r.height,0,1);
    val=min+pct*(max-min); render(); onChange(val);
  }
  el.addEventListener('pointerdown',e=>{el.setPointerCapture(e.pointerId);el.classList.add('active');fromEvent(e);});
  el.addEventListener('pointermove',e=>{if(el.hasPointerCapture(e.pointerId))fromEvent(e);});
  el.addEventListener('pointerup',e=>el.classList.remove('active'));
  el.addEventListener('keydown',e=>{
    const step=(max-min)/40;
    if(e.key==='ArrowUp'||e.key==='ArrowRight'){val=clamp(val+step,min,max);render();onChange(val);e.preventDefault();}
    if(e.key==='ArrowDown'||e.key==='ArrowLeft'){val=clamp(val-step,min,max);render();onChange(val);e.preventDefault();}
  });
  render();
}
bindVSlider($('#sizeSlider'),1,80,14,v=>Math.round(v),v=>State.size=Math.round(v));
bindVSlider($('#opacitySlider'),0,100,100,v=>Math.round(v)+'%',v=>State.opacity=Math.round(v)/100);

/* ---------- tools ---------- */
$$('.tool[data-tool]').forEach(b=>b.addEventListener('click',()=>{
  const wasBrush=b.dataset.tool==='brush' && b.getAttribute('aria-pressed')==='true';
  $$('.tool[data-tool]').forEach(x=>x.setAttribute('aria-pressed','false'));
  b.setAttribute('aria-pressed','true'); State.tool=b.dataset.tool;
  if(wasBrush) openSheet('brushSheet'); // tap active brush again -> brush library
}));

/* ---------- sheets ---------- */
const scrim=$('#scrim');
let openName=null;
function openSheet(id){ closeSheets(); $('#'+id).classList.add('show'); scrim.classList.add('show'); openName=id; }
function closeSheets(){ $$('.sheet').forEach(s=>s.classList.remove('show')); scrim.classList.remove('show'); openName=null; }
scrim.addEventListener('click',closeSheets);
$('#colorBtn').onclick=()=>openSheet('colorSheet');
$('#layerBtn').onclick=()=>{renderLayers();openSheet('layerSheet');};
$('#menuBtn').onclick=()=>openSheet('menuSheet');

/* ---------- color picker ---------- */
const sv=$('#sv'), svPicker=$('#svPicker'), hueEl=$('#hue'), huePicker=$('#huePicker');
function renderColor(){
  const [h,s,v]=State.hsv;
  sv.style.background=`hsl(${h},100%,50%)`;
  svPicker.style.left=(s*100)+'%'; svPicker.style.top=((1-v)*100)+'%';
  huePicker.style.left=(h/360*100)+'%';
  const hx=curHEX(); $('#hexVal').textContent=hx; $('#colorChip').style.background=hx;
  setAccent();
}
function svFrom(e){const r=sv.getBoundingClientRect();
  State.hsv[1]=clamp((e.clientX-r.left)/r.width,0,1);
  State.hsv[2]=clamp(1-(e.clientY-r.top)/r.height,0,1); renderColor();}
function hueFrom(e){const r=hueEl.getBoundingClientRect();
  State.hsv[0]=clamp((e.clientX-r.left)/r.width,0,1)*360; renderColor();}
sv.addEventListener('pointerdown',e=>{sv.setPointerCapture(e.pointerId);svFrom(e);});
sv.addEventListener('pointermove',e=>{if(sv.hasPointerCapture(e.pointerId))svFrom(e);});
hueEl.addEventListener('pointerdown',e=>{hueEl.setPointerCapture(e.pointerId);hueFrom(e);});
hueEl.addEventListener('pointermove',e=>{if(hueEl.hasPointerCapture(e.pointerId))hueFrom(e);});
sv.addEventListener('pointerup',addRecent); hueEl.addEventListener('pointerup',addRecent);

const PALETTE=['#CF4A2C','#E08A2E','#C69749','#5E8A4E','#2C4A63','#46357A','#A23B68','#2A2620','#7A726A','#EFE7D6'];
function buildPalette(){
  const wrap=$('#palette'); wrap.innerHTML='';
  PALETTE.forEach(c=>{const d=document.createElement('button');d.className='sw';d.style.background=c;d.setAttribute('aria-label',c);
    d.onclick=()=>{State.hsv=rgb2hsv(...hex2rgb(c));renderColor();addRecent();};wrap.appendChild(d);});
}
function addRecent(){
  const hx=curHEX(); State.recent=[hx,...State.recent.filter(c=>c!==hx)].slice(0,8);
  const wrap=$('#recent'); wrap.innerHTML='';
  if(!State.recent.length){wrap.innerHTML='<span style="font:400 12px/1 \'Zen Kaku Gothic New\';color:var(--ink-faint)">まだありません</span>';return;}
  State.recent.forEach(c=>{const d=document.createElement('button');d.className='sw';d.style.background=c;d.setAttribute('aria-label',c);
    d.onclick=()=>{State.hsv=rgb2hsv(...hex2rgb(c));renderColor();};wrap.appendChild(d);});
}

/* ---------- brush sheet ---------- */
function buildBrushes(){
  const list=$('#brushList'); list.innerHTML='';
  Object.entries(BRUSHES).forEach(([key,B])=>{
    const row=document.createElement('button');
    row.className='brushrow'; row.setAttribute('aria-pressed', key===State.brush);
    row.innerHTML=`<canvas class="pv" width="168" height="60"></canvas>
      <div><div class="nm">${B.name}</div><div class="ds">${B.desc}</div></div>
      <span class="check"><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg></span>`;
    row.onclick=()=>{State.brush=key;State.tool='brush';
      $$('.tool[data-tool]').forEach(x=>x.setAttribute('aria-pressed',x.dataset.tool==='brush'));
      $$('.brushrow').forEach(r=>r.setAttribute('aria-pressed','false'));
      row.setAttribute('aria-pressed','true'); };
    list.appendChild(row);
    drawBrushPreview($('.pv',row),key);
  });
}
function drawBrushPreview(cv,key){
  const c=cv.getContext('2d'); c.clearRect(0,0,168,60);
  const B=BRUSHES[key], col='#2a2620';
  c.save();
  const pts=[]; for(let i=0;i<=40;i++){const x=12+i*3.6;const y=30+Math.sin(i/4)*13;pts.push({x,y});}
  if(key==='ink'){c.strokeStyle=col;c.lineCap='round';c.lineJoin='round';
    for(let i=1;i<pts.length;i++){c.beginPath();c.lineWidth=2+Math.sin(i/3)*1.8;c.moveTo(pts[i-1].x,pts[i-1].y);c.lineTo(pts[i].x,pts[i].y);c.stroke();}}
  else if(key==='marker'){c.strokeStyle=col;c.globalAlpha=.45;c.lineWidth=9;c.lineCap='butt';c.lineJoin='round';
    c.beginPath();pts.forEach((p,i)=>i?c.lineTo(p.x,p.y):c.moveTo(p.x,p.y));c.stroke();}
  else if(key==='pencil'){c.fillStyle=col;pts.forEach(p=>{for(let k=0;k<4;k++){c.globalAlpha=.18+Math.random()*.3;c.beginPath();c.arc(p.x+(Math.random()-.5)*5,p.y+(Math.random()-.5)*5,1.1,0,7);c.fill();}});}
  else{const grd=()=>{pts.forEach(p=>{const g=c.createRadialGradient(p.x,p.y,0,p.x,p.y,8);g.addColorStop(0,'rgba(42,38,32,.10)');g.addColorStop(1,'rgba(42,38,32,0)');c.fillStyle=g;c.beginPath();c.arc(p.x,p.y,8,0,7);c.fill();});};grd();grd();}
  c.restore();
}

/* ---------- layers ---------- */
function renderLayers(){
  const list=$('#layerList'); list.innerHTML='';
  for(let i=layers.length-1;i>=0;i--){
    const L=layers[i], idx=i;
    const row=document.createElement('div');
    row.className='layerrow'+(idx===activeLayer?' active':'')+(L.visible?'':' hidden');
    row.innerHTML=`<div class="thumb"><canvas width="92" height="92"></canvas></div>
      <div class="info"><div class="ln">${L.name}</div><div class="lo">${Math.round(L.opacity*100)}%</div></div>
      <button class="eye" aria-label="表示切替">${L.visible?eyeOpen:eyeOff}</button>
      <button class="del" aria-label="削除">${trashIco}</button>`;
    $('.info',row).onclick=()=>{activeLayer=idx;renderLayers();};
    $('.eye',row).onclick=e=>{e.stopPropagation();L.visible=!L.visible;composite();renderLayers();};
    $('.del',row).onclick=e=>{e.stopPropagation(); if(layers.length<=1){toast('最後のレイヤーは消せません');return;}
      layers.splice(idx,1); if(activeLayer>=layers.length)activeLayer=layers.length-1; composite();renderLayers();updBadge();};
    const tc=$('canvas',row); tc.getContext('2d').drawImage(L.canvas,0,0,92,92);
    list.appendChild(row);
  }
  updBadge();
}
function refreshLayerThumbs(){ if(openName==='layerSheet') renderLayers(); }
function updBadge(){$('#layerBadge').textContent=layers.length;}
$('#addLayer').onclick=()=>{layers.push(makeLayer('レイヤー '+(layers.length+1)));activeLayer=layers.length-1;composite();renderLayers();toast('レイヤーを追加');};
const eyeOpen=`<svg viewBox="0 0 24 24"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="2.6"/></svg>`;
const eyeOff=`<svg viewBox="0 0 24 24"><path d="M3 3l18 18"/><path d="M10.6 6.2A9 9 0 0 1 12 6c6.5 0 10 6 10 6a16 16 0 0 1-3 3.5M6.3 7.8A16 16 0 0 0 2 12s3.5 6 10 6a9 9 0 0 0 3-.5"/></svg>`;
const trashIco=`<svg viewBox="0 0 24 24"><path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13"/></svg>`;

/* ---------- menu actions ---------- */
$('#actSave').onclick=()=>{const a=document.createElement('a');a.download='hatch-sketch.png';a.href=dcanvas.toDataURL('image/png');a.click();closeSheets();toast('画像を保存しました');};
$('#actClear').onclick=()=>{pushUndo();const L=layers[activeLayer];L.ctx.clearRect(0,0,W,H);composite();refreshLayerThumbs();closeSheets();toast('レイヤーを消去');};
$('#actDone').onclick=()=>{saveToGallery();closeSheets();gotoGallery();};

/* ---------- navigation ---------- */
const newBtn=$('#newBtn');
function gotoCanvas(fresh){
  document.body.classList.add('in-canvas');
  requestAnimationFrame(()=>{ setupCanvas();
    if(fresh && sized){ layers.forEach(L=>L.ctx.clearRect(0,0,W,H)); composite(); undoStack=[];redoStack=[];updHist(); }
  });
}
function gotoGallery(){document.body.classList.remove('in-canvas');closeSheets();}
newBtn.onclick=()=>gotoCanvas(true);
$('#backBtn').onclick=()=>{saveToGallery();gotoGallery();};

function saveToGallery(){
  if(!sized) return;
  const url=dcanvas.toDataURL('image/png');
  const grid=$('#galleryGrid');
  const card=document.createElement('button');
  card.className='piece'; card.innerHTML=`<img src="${url}" alt="あなたのスケッチ"><span class="meta">あなたのスケッチ · たった今</span>`;
  card.onclick=()=>gotoCanvas(false);
  grid.insertBefore(card, newBtn.nextSibling);
  const n=grid.querySelectorAll('.piece:not(.new)').length;
  $('#pieceCount').innerHTML=n+'点の<br>スケッチ';
}

/* ---------- procedural sample gallery thumbnails ---------- */
function makeSample(seed){
  const c=document.createElement('canvas'); c.width=300;c.height=400; const x=c.getContext('2d');
  x.fillStyle=PAPER; x.fillRect(0,0,300,400);
  const inks=['#cf4a2c','#2c4a63','#c69749','#2a2620'];
  let s=seed*9301;
  const rnd=()=>{s=(s*9301+49297)%233280;return s/233280;};
  for(let k=0;k<6;k++){
    x.strokeStyle=inks[Math.floor(rnd()*inks.length)];
    x.lineWidth=2+rnd()*9; x.lineCap='round'; x.globalAlpha=.55+rnd()*.4;
    x.beginPath(); let px=rnd()*300, py=rnd()*400; x.moveTo(px,py);
    for(let j=0;j<5;j++){px+=( rnd()-.5)*180; py+=(rnd()-.5)*200; x.quadraticCurveTo(rnd()*300,rnd()*400,px,py);} x.stroke();
  }
  x.globalAlpha=1;
  return c.toDataURL('image/png');
}
function buildGallery(){
  const grid=$('#galleryGrid');
  const titles=['朝の習作','街の輪郭','余白の練習'];
  titles.forEach((t,i)=>{
    const card=document.createElement('button'); card.className='piece';
    card.style.animationDelay=(i*0.06)+'s';
    card.innerHTML=`<img src="${makeSample(i+2)}" alt="${t}"><span class="meta">${t}</span>`;
    card.onclick=()=>gotoCanvas(false);
    grid.appendChild(card);
  });
}

/* ---------- toast ---------- */
let toastT; function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1600);}

/* ---------- init ---------- */
buildGallery(); buildPalette(); addRecent(); buildBrushes(); renderColor();
</script>
