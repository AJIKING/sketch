name: sketch
description: "Hatch — ポケットのアトリエ。スケッチ/お絵描き Flutter アプリ。"
# pub.dev への誤公開を防ぐ(非公開アプリ)。
publish_to: 'none'

# version は <semver>+<build>。iOS/Android のビルド番号は CI 側で上書きする。
version: 1.0.0+1

environment:
  sdk: ^3.12.1

# 依存はハーネス方針(docs/harness-engineering.md)に従い「必要になるまで増やさない」。
# 描画は Flutter 標準(CustomPainter / Canvas)のみ。
dependencies:
  flutter:
    sdk: flutter

  # iOS 風アイコンを使う場合に備える Flutter 標準同梱パッケージ。
  cupertino_icons: ^1.0.8

  # ギャラリーの永続化先(アプリ内ドキュメントディレクトリ)を得る。
  # docs/design-docs/0001-sketch-persistence.md(FileGalleryStore)。
  path_provider: ^2.1.5

  # 「画像として保存」= 端末の共有シート経由でエクスポート(ImageExporter)。
  share_plus: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  # integration smoke test(integration_test/)用。
  integration_test:
    sdk: flutter
  # 描画エンジンの速度依存・タイマー系を実時間なしでテストするため。
  fake_async: ^1.3.0

  # 推奨 lint セット。analysis_options.yaml で有効化している。
  flutter_lints: ^6.0.0

flutter:
  # Material Icons フォントを同梱する。
  uses-material-design: true

  # カスタムフォント(docs/prototype/hatch-sketch-app.html 準拠: Fraunces /
  # Space Grotesk / Zen Kaku Gothic New)。フォントファイルを assets/fonts/ に
  # 配置したら以下のコメントを外して登録する(ライセンスも同梱すること)。
  # fonts:
  #   - family: Fraunces
  #     fonts:
  #       - asset: assets/fonts/Fraunces-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/Fraunces-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Fraunces-Black.ttf
  #         weight: 900
  #   - family: SpaceGrotesk
  #     fonts:
  #       - asset: assets/fonts/SpaceGrotesk-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/SpaceGrotesk-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/SpaceGrotesk-SemiBold.ttf
  #         weight: 600
  #   - family: ZenKakuGothicNew
  #     fonts:
  #       - asset: assets/fonts/ZenKakuGothicNew-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/ZenKakuGothicNew-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/ZenKakuGothicNew-Bold.ttf
  #         weight: 700
